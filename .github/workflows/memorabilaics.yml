name: Memorabilaics Testing

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  streamlit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libzbar0
      - name: Create Streamlit secrets file for CI/CD
        run: |
          mkdir -p .streamlit
          cat > .streamlit/secrets.toml << 'EOF'
          ${{ secrets.CI_SECRETS }}
          EOF
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13.2"
      - uses: streamlit/streamlit-app-action@v0.0.3
        with:
          app-path: memorabiliacs.py
          ruff: true
